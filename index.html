<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeBonCode - Scanner Premium Magenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            /* Palette Magenta 100% inspirée de l'image */
            --bg-global: #fce8f3; /* Arrière-plan global extérieur */
            --bg-app: #fdf5f9; /* Fond de l'application (rose très pâle) */
            --primary-gradient: linear-gradient(160deg, #df22ca 0%, #ff00ff 100%); /* Dégradé Magenta 100% */
            --primary-solid: #ff00ff; /* Magenta pur */
            --secondary-bg: #f9dcee; /* Rose clair pour les cercles d'action */
            --icon-color: #7a007a; /* Magenta foncé pour les icônes */
            
            --dark-text: #3a003a;
            --muted-text: #9e6b9e;
            --card-white: #ffffff;
            
            --success-green: #3cd371;
            --success-bg: #e3f9ec;
            --danger-red: #ff4d4d;
            --danger-bg: #ffe6e6;
            
            --radius-xl: 28px;
            --radius-md: 18px;
            --font-family: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-global);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* Conteneur façon Smartphone moderne */
        .phone-container {
            max-width: 410px;
            width: 100%;
            background: var(--bg-app);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(255, 0, 255, 0.15), 0 0 0 12px #121118;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Zone défilante interne */
        .app-content {
            padding: 24px;
            overflow-y: auto;
            max-height: 85vh;
        }

        /* Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-placeholder {
            width: 44px;
            height: 44px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 0, 255, 0.2);
            font-size: 0.85rem;
        }

        .welcome-text h2 {
            font-size: 1.25rem;
            color: var(--dark-text);
            font-weight: 700;
        }

        .welcome-text p {
            font-size: 0.85rem;
            color: var(--muted-text);
        }

        /* Bouton réglages en haut à droite */
        .settings-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .settings-btn svg {
            stroke: var(--icon-color);
            width: 24px;
            height: 24px;
            fill: none;
        }

        /* Carte principale en dégradé Magenta */
        .main-portfolio-card {
            background: var(--primary-gradient);
            border-radius: var(--radius-xl);
            padding: 22px;
            color: white;
            box-shadow: 0 12px 25px rgba(255, 0, 255, 0.3);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .main-portfolio-card::after {
            content: '';
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .main-balance {
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        /* Viseur Caméra épuré intégré à la carte */
        #reader-container {
            width: 100%;
            background: #000;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        #reader {
            width: 100%;
            border: none !important;
        }

        #status {
            font-size: 0.85rem;
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.15);
            padding: 8px 12px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: 600;
        }

        /* Boutons d'action rapides ronds */
        .quick-actions {
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .action-circle {
            width: 56px;
            height: 56px;
            background: var(--secondary-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-circle svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .action-item p {
            font-size: 0.75rem;
            color: var(--dark-text);
            font-weight: 600;
        }

        /* Bouton Spécial Fléché (Suivant) */
        .btn-next-step {
            background: var(--primary-gradient);
            color: white !important;
            animation: softPulse 2s infinite;
        }
        .btn-next-step svg {
            stroke: white !important;
        }

        /* Menu Liste du bas (Assistant, Help style) */
        .list-section {
            background: var(--card-white);
            border-radius: var(--radius-xl);
            padding: 8px;
            box-shadow: 0 10px 25px rgba(255,0,255,0.04);
            margin-bottom: 20px;
        }

        .list-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 14px;
            border-bottom: 1px solid var(--bg-app);
        }

        .list-row:last-child {
            border-bottom: none;
        }

        .list-row-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .row-icon-box {
            width: 38px;
            height: 38px;
            background: var(--secondary-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-icon-box svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 2;
        }

        .row-text {
            display: flex;
            flex-direction: column;
        }

        .row-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark-text);
        }

        .row-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-solid);
            margin-top: 2px;
        }

        .chevron-right {
            width: 18px;
            height: 18px;
            stroke: var(--muted-text);
            stroke-width: 2;
            fill: none;
        }

        /* Bannière d'alerte de résultats */
        .result-banner {
            border-radius: var(--radius-md);
            padding: 16px;
            display: none;
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .result-banner.match {
            display: block;
            background: var(--success-bg);
            color: var(--success-green);
            border: 1px solid rgba(60, 211, 113, 0.2);
        }
        .result-banner.mismatch {
            display: block;
            background: var(--danger-bg);
            color: var(--danger-red);
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        /* Animations */
        @keyframes softPulse {
            0% { transform: scale(1); box-shadow: 0 10px 25px rgba(255, 0, 255, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 10px 30px rgba(255, 0, 255, 0.5); }
            100% { transform: scale(1); box-shadow: 0 10px 25px rgba(255, 0, 255, 0.3); }
        }

        /* Badge d'étape actif */
        .step-pill {
            background: rgba(255,255,255,0.25);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .step-pill.completed {
            background: var(--success-green);
            color: white;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="app-content">
        
        <div class="app-header">
            <div class="user-profile">
                <div class="avatar-placeholder">LBC</div>
                <div class="welcome-text">
                    <p>Scanner Sécurisé</p>
                    <h2>LeBonCode</h2>
                </div>
            </div>
            <div class="settings-btn" onclick="resetScanner()">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3c.06-.61.06-1.17.06-1.76 0-.58-.02-1.14-.06-1.74l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1a8.65 8.65 0 0 0-3-1.74l-.37-2.65A.596.596 0 0 0 12 1h-4c-.3 0-.55.22-.59.51l-.37 2.65c-.1.03-.2.07-.3.1-.97.4-1.87.95-2.7 1.63l-2.49-1a.593.593 0 0 0-.61.22l-2 3.46c-.12.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07 1.01s.02.68.06 1.01l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.73.57 1.54 1.03 2.42 1.35l.37 2.65c.05.3.3.51.59.51h4c.3 0 .55-.22.59-.51l.37-2.65c.88-.32 1.69-.78 2.42-1.35l2.49 1c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/></svg>
            </div>
        </div>

        <div class="main-portfolio-card">
            <div class="card-meta">
                <span id="step-title-display">ÉTAPE 1 : EN COURS</span>
                <span class="step-pill" id="step-pill-ui">AFFICHE</span>
            </div>
            <div class="main-balance">
                <div id="reader-container">
                    <div id="reader"></div>
                </div>
            </div>
            <div id="status">Chargement de l'appareil photo...</div>
        </div>

        <div class="quick-actions">
            <div id="btn-ocr" class="action-item" onclick="scannerChiffresSeuls()">
                <div class="action-circle">
                    <svg viewBox="0 0 24 24"><path d="M4 7V4h3M17 4h3v3M20 17v3h-3M7 20H4v-3M9 12h6M12 9v6"/></svg>
                </div>
                <p>Lecture IA</p>
            </div>

            <div id="btn-next" class="action-item" style="display: none;" onclick="activerEtape2()">
                <div class="action-circle btn-next-step">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
                <p style="font-weight: 700; color: var(--icon-color);">Étape 2</p>
            </div>
        </div>

        <div id="result" class="result-banner"></div>

        <div class="list-section">
            <div class="list-row">
                <div class="list-row-left">
                    <div class="row-icon-box">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <div class="row-text">
                        <span class="row-title">Numéro Affiche</span>
                        <span id="code-affiche-val" class="row-value">-</span>
                    </div>
                </div>
                <svg class="chevron-right" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>

            <div class="list-row">
                <div class="list-row-left">
                    <div class="row-icon-box">
                        <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                    </div>
                    <div class="row-text">
                        <span class="row-title">Numéro Étiquette</span>
                        <span id="code-etiquette-val" class="row-value" style="color: var(--success-green);">-</span>
                    </div>
                </div>
                <svg class="chevron-right" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </div>
        </div>

    </div>
</div>

<script>
    let codeAffiche = null;
    let codeEtiquette = null;
    let html5QrcodeScanner = null;
    let scanEnPause = false;

    function startScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 15, 
                qrbox: function(width, height) {
                    return { width: Math.floor(width * 0.8), height: Math.floor(height * 0.5) };
                },
                rememberLastUsedCamera: true
            }
        );
        html5QrcodeScanner.render(onScanSuccess, onScanError);
        
        setTimeout(() => {
            document.getElementById('status').innerText = "Visez l'AFFICHE (Code ou Chiffres)";
        }, 1000);
    }

    function onScanSuccess(decodedText) {
        if (scanEnPause) return;
        let codeNettoye = decodedText.trim().replace(/[^0-9]/g, "");
        enregistrerCode(codeNettoye);
    }

    function onScanError(err) {}

    async function scannerChiffresSeuls() {
        if (scanEnPause) return;

        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Analyse IA des chiffres...";
        
        const videoElement = document.querySelector('#reader video');
        if (!videoElement) {
            statusDiv.innerText = "Caméra non prête.";
            return;
        }

        const canvas = document.createElement('canvas');
        canvas.width = videoElement.videoWidth;
        canvas.height = videoElement.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

        try {
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            const chiffresTrouves = text.replace(/[^0-9]/g, "");

            if (!chiffresTrouves || chiffresTrouves.length < 2) {
                statusDiv.innerText = "❌ Échec de lecture. Rapprochez-vous.";
                return;
            }

            enregistrerCode(chiffresTrouves);
        } catch (error) {
            statusDiv.innerText = "Erreur de lecture.";
        }
    }

    function enregistrerCode(code) {
        if (!codeAffiche) {
            codeAffiche = code;
            document.getElementById('code-affiche-val').innerText = codeAffiche;
            
            scanEnPause = true; 
            
            document.getElementById('step-title-display').innerText = "ÉTAPE 1 : ENREGISTRÉE";
            const pill = document.getElementById('step-pill-ui');
            pill.innerText = "OK";
            pill.className = "step-pill completed";

            document.getElementById('btn-ocr').style.display = 'none';
            document.getElementById('btn-next').style.display = 'flex';
            document.getElementById('status').innerText = "Affiche validée ! Passez à l'étape suivante.";
            vibrate(100);
        } else if (codeAffiche && !codeEtiquette) {
            codeEtiquette = code;
            document.getElementById('code-etiquette-val').innerText = codeEtiquette;
            
            scanEnPause = true;
            document.getElementById('btn-ocr').style.display = 'none';
            vibrate(100);
            verifierCodes();
        }
    }

    function activerEtape2() {
        scanEnPause = false;
        
        document.getElementById('step-title-display').innerText = "ÉTAPE 2 : EN COURS";
        const pill = document.getElementById('step-pill-ui');
        pill.innerText = "ÉTIQUETTE";
        pill.className = "step-pill";

        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-ocr').style.display = 'flex';
        document.getElementById('status').innerText = "Visez l'ÉTIQUETTE (Code ou Chiffres)";
    }

    function verifierCodes() {
        const resultDiv = document.getElementById('result');
        if (codeAffiche === codeEtiquette) {
            resultDiv.innerText = "CORRESPONDANCE PARFAITE";
            resultDiv.className = "result-banner match";
            vibrate([100, 50, 100]);
        } else {
            resultDiv.innerText = "ERREUR : CODES DIFFÉRENTS";
            resultDiv.className = "result-banner mismatch";
            vibrate([500]);
        }
        document.getElementById('status').innerText = "Contrôle terminé.";
        document.getElementById('step-title-display').innerText = "CONTRÔLE EFFECTUÉ";
    }

    function resetScanner() {
        codeAffiche = null;
        codeEtiquette = null;
        scanEnPause = false;
        
        document.getElementById('code-affiche-val').innerText = "-";
        document.getElementById('code-etiquette-val').innerText = "-";
        
        document.getElementById('step-title-display').innerText = "ÉTAPE 1 : EN COURS";
        const pill = document.getElementById('step-pill-ui');
        pill.innerText = "AFFICHE";
        pill.className = "step-pill";
        
        document.getElementById('result').className = "result-banner";
        document.getElementById('result').style.display = 'none';
        
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-ocr').style.display = 'flex';
        document.getElementById('status').innerText = "Visez l'AFFICHE (Code ou Chiffres)";
    }

    function vibrate(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }

    window.addEventListener('DOMContentLoaded', startScanner);
</script>

</body>
</html>
