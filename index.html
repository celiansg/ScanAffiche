<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérificateur de Commandes - Affiches & Étiquettes</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--dark);
        }

        .steps-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            margin: 0 5px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .step.active {
            border-color: var(--primary);
            background: #e8f4fd;
            color: var(--primary);
        }

        .step.completed {
            border-color: var(--success);
            background: #e8f8f0;
            color: var(--success);
        }

        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: none !important;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
        }

        .result-box.match {
            display: block;
            background-color: var(--success);
            color: white;
            animation: pulse 0.5s ease;
        }

        .result-box.mismatch {
            display: block;
            background-color: var(--danger);
            color: white;
            animation: shake 0.5s ease;
        }

        .values-display {
            margin-top: 15px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .values-display p {
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Contrôle Étiquetage</h1>

    <div class="steps-container">
        <div id="step1" class="step active">1. AFFICHE</div>
        <div id="step2" class="step">2. ÉTIQUETTE</div>
    </div>

    <div id="reader"></div>

    <div class="values-display">
        <p><strong>Code Affiche :</strong> <span id="code-affiche-val">-</span></p>
        <p><strong>Code Étiquette :</strong> <span id="code-etiquette-val">-</span></p>
    </div>

    <div id="result" class="result-box"></div>

    <button id="btn-reset" onclick="resetScanner()">Recommencer / Suivant</button>
</div>

<script>
    let codeAffiche = null;
    let codeEtiquette = null;
    let html5QrcodeScanner = null;

    // Configuration et démarrage du scanner au chargement
    function startScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 150 }, // Box adaptée aux codes-barres allongés
                rememberLastUsedCamera: true
            }
        );
        html5QrcodeScanner.render(onScanSuccess);
    }

    // Fonction appelée dès qu'un code est détecté
    function onScanSuccess(decodedText, decodedResult) {
        // Étape 1 : Scan de l'affiche
        if (!codeAffiche) {
            codeAffiche = decodedText.trim();
            document.getElementById('code-affiche-val').innerText = codeAffiche;
            
            // Maj Visuelle Étapes
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step1').classList.add('completed');
            document.getElementById('step2').classList.add('active');
            
            // Émettre un petit bip sonore ou vibration si supporté
            vibratePhone(100);
            return;
        }

        // Étape 2 : Scan de l'étiquette
        if (codeAffiche && !codeEtiquette) {
            codeEtiquette = decodedText.trim();
            document.getElementById('code-etiquette-val').innerText = codeEtiquette;
            
            document.getElementById('step2').classList.add('completed');
            
            vibratePhone(100);
            verifierCodes();
        }
    }

    // Vérification de la correspondance
    function verifierCodes() {
        const resultDiv = document.getElementById('result');
        
        if (codeAffiche === codeEtiquette) {
            resultDiv.innerText = "✅ VALIDE : C'est la bonne étiquette !";
            resultDiv.className = "result-box match";
            vibratePhone([100, 50, 100]); // Double vibration pour le succès
        } else {
            resultDiv.innerText = "❌ ERREUR : Les codes ne correspondent pas !";
            resultDiv.className = "result-box mismatch";
            vibratePhone([500]); // Longue vibration pour l'erreur
        }
    }

    // Réinitialisation pour la commande suivante
    function resetScanner() {
        codeAffiche = null;
        codeEtiquette = null;
        
        document.getElementById('code-affiche-val').innerText = "-";
        document.getElementById('code-etiquette-val').innerText = "-";
        
        document.getElementById('step1').className = "step active";
        document.getElementById('step2').className = "step";
        
        const resultDiv = document.getElementById('result');
        resultDiv.className = "result-box";
        resultDiv.innerText = "";
    }

    // Optionnel : Fait vibrer le téléphone de l'utilisateur (si Android/Chrome)
    function vibratePhone(pattern) {
        if (navigator.vibrate) {
            navigator.vibrate(pattern);
        }
    }

    // Lancement du scanner au chargement de la page
    window.addEventListener('DOMContentLoaded', startScanner);
</script>

</body>
</html>
