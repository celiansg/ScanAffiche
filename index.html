<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeBonCode - Scanner Universel</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--dark);
        }

        .steps-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            margin: 0 5px;
            font-weight: bold;
        }

        .step.active {
            border-color: var(--primary);
            background: #e8f4fd;
            color: var(--primary);
        }

        .step.completed {
            border-color: var(--success);
            background: #e8f8f0;
            color: var(--success);
        }

        /* Zone du scanner */
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: none !important;
            background: black;
        }

        #status {
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            margin: 15px 0 5px 0;
        }

        .ocr-btn {
            width: 100%;
            padding: 12px;
            background-color: #f39c12;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: none; /* Apparaît quand le scanner est prêt */
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
        }

        .result-box.match { display: block; background-color: var(--success); color: white; }
        .result-box.mismatch { display: block; background-color: var(--danger); color: white; }

        .values-display {
            margin-top: 15px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn-reset {
            width: 100%;
            padding: 12px;
            background-color: var(--dark);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>LeBonCode</h1>

    <div class="steps-container">
        <div id="step1" class="step active">1. AFFICHE</div>
        <div id="step2" class="step">2. ÉTIQUETTE</div>
    </div>

    <div id="reader"></div>

    <div id="status">Initialisation de la caméra...</div>

    <button id="btn-ocr" class="ocr-btn" onclick="scannerChiffresSeuls()">🔢 LIRE COMME CHIFFRES SEULS</button>

    <div class="values-display">
        <p><strong>Numéro Affiche :</strong> <span id="code-affiche-val">-</span></p>
        <p><strong>Numéro Étiquette :</strong> <span id="code-etiquette-val">-</span></p>
    </div>

    <div id="result" class="result-box"></div>

    <button class="btn-reset" onclick="resetScanner()">Suivant / Réinitialiser</button>
</div>

<script>
    let codeAffiche = null;
    let codeEtiquette = null;
    let html5QrcodeScanner = null;

    function startScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 15, 
                qrbox: function(width, height) {
                    // Box large et fine idéale pour les codes-barres de produits
                    return { width: Math.floor(width * 0.8), height: Math.floor(height * 0.4) };
                },
                rememberLastUsedCamera: true
            }
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanError);
        
        // On affiche le bouton de secours une fois chargé
        setTimeout(() => {
            document.getElementById('btn-ocr').style.display = 'block';
            document.getElementById('status').innerText = "Visez un Code-barres/QR Code OU utilisez le bouton orange ci-dessous.";
        }, 1000);
    }

    // Cas 1 : Détection automatique de Code-barres ou QR Code
    function onScanSuccess(decodedText) {
        let codeNettoye = decodedText.trim().replace(/[^0-9]/g, ""); // On ne garde que les chiffres pour être sûr
        enregistrerCode(codeNettoye);
    }

    function onScanError(err) {
        // Mode silencieux pour éviter de spammer la console pendant la recherche
    }

    // Cas 2 : L'utilisateur clique car ce ne sont que des chiffres écrits en texte
    async function scannerChiffresSeuls() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Analyse de l'image... Patientez 2 secondes...";
        
        // On récupère le flux vidéo actif du scanner pour prendre une photo
        const videoElement = document.querySelector('#reader video');
        if (!videoElement) {
            statusDiv.innerText = "Erreur : Caméra non détectée.";
            return;
        }

        const canvas = document.createElement('canvas');
        canvas.width = videoElement.videoWidth;
        canvas.height = videoElement.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

        // Analyse OCR avec Tesseract
        try {
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            const chiffresTrouves = text.replace(/[^0-9]/g, ""); // Filtre pour ne garder que les numéros

            if (!chiffresTrouves || chiffresTrouves.length < 2) {
                statusDiv.innerText = "❌ Aucun numéro lu. Rapprochez-vous et réessayez.";
                return;
            }

            statusDiv.innerText = "Numéro détecté avec succès !";
            enregistrerCode(chiffresTrouves);
        } catch (error) {
            statusDiv.innerText = "Erreur lors de la lecture des chiffres.";
        }
    }

    // Logique commune d'enregistrement
    function enregistrerCode(code) {
        if (!codeAffiche) {
            codeAffiche = code;
            document.getElementById('code-affiche-val').innerText = codeAffiche;
            document.getElementById('step1').className = "step completed";
            document.getElementById('step2').className = "step active";
            document.getElementById('status').innerText = "Affiche validée. Scannez maintenant l'étiquette.";
            vibrate(100);
        } else if (codeAffiche && !codeEtiquette) {
            codeEtiquette = code;
            document.getElementById('code-etiquette-val').innerText = codeEtiquette;
            document.getElementById('step2').className = "step completed";
            vibrate(100);
            verifierCodes();
        }
    }

    function verifierCodes() {
        const resultDiv = document.getElementById('result');
        if (codeAffiche === codeEtiquette) {
            resultDiv.innerText = "✅ VALIDE : Les numéros correspondent !";
            resultDiv.className = "result-box match";
            vibrate([100, 50, 100]);
        } else {
            resultDiv.innerText = "❌ ERREUR : Les numéros sont différents !";
            resultDiv.className = "result-box mismatch";
            vibrate([500]);
        }
        document.getElementById('status').innerText = "Vérification terminée.";
    }

    function resetScanner() {
        codeAffiche = null;
        codeEtiquette = null;
        document.getElementById('code-affiche-val').innerText = "-";
        document.getElementById('code-etiquette-val').innerText = "-";
        document.getElementById('step1').className = "step active";
        document.getElementById('step2').className = "step";
        document.getElementById('result').className = "result-box";
        document.getElementById('status').innerText = "Visez un Code-barres/QR Code OU utilisez le bouton orange.";
    }

    function vibrate(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }

    window.addEventListener('DOMContentLoaded', startScanner);
</script>

</body>
</html>
