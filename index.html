<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeBonCode - Scanner Sécurisé</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --warning: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--dark);
        }

        .steps-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            margin: 0 5px;
            font-weight: bold;
        }

        .step.active {
            border-color: var(--primary);
            background: #e8f4fd;
            color: var(--primary);
        }

        .step.completed {
            border-color: var(--success);
            background: #e8f8f0;
            color: var(--success);
        }

        #reader-container {
            position: relative;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: black;
            min-height: 200px;
        }

        #reader {
            width: 100%;
            border: none !important;
        }

        #status {
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            margin: 15px 0 5px 0;
            padding: 0 10px;
        }

        /* Les boutons d'action */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-ocr {
            background-color: var(--warning);
            color: white;
        }

        .btn-next-step {
            background-color: var(--primary);
            color: white;
            font-size: 1.2rem;
            display: none; /* Caché par défaut */
            animation: pulse 1.5s infinite;
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
        }

        .result-box.match { display: block; background-color: var(--success); color: white; }
        .result-box.mismatch { display: block; background-color: var(--danger); color: white; }

        .values-display {
            margin-top: 15px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn-reset {
            background-color: var(--dark);
            color: white;
            margin-top: 15px;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(52, 152, 219, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52, 152, 219, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>LeBonCode</h1>

    <div class="steps-container">
        <div id="step1" class="step active">1. AFFICHE</div>
        <div id="step2" class="step">2. ÉTIQUETTE</div>
    </div>

    <div id="reader-container">
        <div id="reader"></div>
    </div>

    <div id="status">Chargement de l'appareil photo...</div>

    <button id="btn-next" class="btn btn-next-step" onclick="activerEtape2()">➡️ PASSER À L'ÉTIQUETTE</button>

    <button id="btn-ocr" class="btn btn-ocr" onclick="scannerChiffresSeuls()">🔢 LIRE COMME CHIFFRES SEULS</button>

    <div class="values-display">
        <p><strong>Numéro Affiche :</strong> <span id="code-affiche-val">-</span></p>
        <p><strong>Numéro Étiquette :</strong> <span id="code-etiquette-val">-</span></p>
    </div>

    <div id="result" class="result-box"></div>

    <button class="btn btn-reset" onclick="resetScanner()">Recommencer / Suivant</button>
</div>

<script>
    let codeAffiche = null;
    let codeEtiquette = null;
    let html5QrcodeScanner = null;
    let scanEnPause = false;

    function startScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 15, 
                qrbox: function(width, height) {
                    return { width: Math.floor(width * 0.8), height: Math.floor(height * 0.4) };
                },
                rememberLastUsedCamera: true
            }
        );
        html5QrcodeScanner.render(onScanSuccess, onScanError);
        
        setTimeout(() => {
            document.getElementById('status').innerText = "Visez le code ou les chiffres de l'AFFICHE.";
        }, 1000);
    }

    // Détection auto de Code-barres ou QR Code
    function onScanSuccess(decodedText) {
        if (scanEnPause) return; // Bloque les scans accidentels multiples

        let codeNettoye = decodedText.trim().replace(/[^0-9]/g, "");
        enregistrerCode(codeNettoye);
    }

    function onScanError(err) {}

    // Détection manuelle (Chiffres seuls)
    async function scannerChiffresSeuls() {
        if (scanEnPause) return;

        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Analyse des chiffres... Patientez...";
        
        const videoElement = document.querySelector('#reader video');
        if (!videoElement) {
            statusDiv.innerText = "Erreur : Caméra non prête.";
            return;
        }

        const canvas = document.createElement('canvas');
        canvas.width = videoElement.videoWidth;
        canvas.height = videoElement.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

        try {
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            const chiffresTrouves = text.replace(/[^0-9]/g, "");

            if (!chiffresTrouves || chiffresTrouves.length < 2) {
                statusDiv.innerText = "❌ Aucun numéro lu. Rapprochez-vous.";
                return;
            }

            enregistrerCode(chiffresTrouves);
        } catch (error) {
            statusDiv.innerText = "Erreur de lecture.";
        }
    }

    // Logique d'enregistrement avec blocage
    function enregistrerCode(code) {
        if (!codeAffiche) {
            // Étape 1 validée
            codeAffiche = code;
            document.getElementById('code-affiche-val').innerText = codeAffiche;
            document.getElementById('step1').className = "step completed";
            
            // On gèle le scanner pour éviter le double scan automatique
            scanEnPause = true; 
            
            // Interface : On cache le bouton orange, on montre le bouton bleu "Suivant"
            document.getElementById('btn-ocr').style.display = 'none';
            document.getElementById('btn-next').style.display = 'block';
            document.getElementById('status').innerText = "Affiche enregistrée ! Placez-vous sur l'étiquette puis cliquez sur le bouton bleu.";
            vibrate(100);
        } else if (codeAffiche && !codeEtiquette) {
            // Étape 2 validée
            codeEtiquette = code;
            document.getElementById('code-etiquette-val').innerText = codeEtiquette;
            document.getElementById('step2').className = "step completed";
            
            scanEnPause = true;
            document.getElementById('btn-ocr').style.display = 'none';
            vibrate(100);
            verifierCodes();
        }
    }

    // Action du bouton intermédiaire
    function activerEtape2() {
        // On relance la possibilité de scanner
        scanEnPause = false;
        
        // MAJ Interface
        document.getElementById('step2').className = "step active";
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-ocr').style.display = 'block'; // On remet le bouton orange si besoin
        document.getElementById('status').innerText = "Visez le code ou les chiffres de l'ÉTIQUETTE.";
    }

    function verifierCodes() {
        const resultDiv = document.getElementById('result');
        if (codeAffiche === codeEtiquette) {
            resultDiv.innerText = "✅ VALIDE : Correspondance parfaite !";
            resultDiv.className = "result-box match";
            vibrate([100, 50, 100]);
        } else {
            resultDiv.innerText = "❌ ERREUR : Les numéros sont différents !";
            resultDiv.className = "result-box mismatch";
            vibrate([500]);
        }
        document.getElementById('status').innerText = "Vérification terminée.";
    }

    function resetScanner() {
        codeAffiche = null;
        codeEtiquette = null;
        scanEnPause = false;
        
        document.getElementById('code-affiche-val').innerText = "-";
        document.getElementById('code-etiquette-val').innerText = "-";
        document.getElementById('step1').className = "step active";
        document.getElementById('step2').className = "step";
        document.getElementById('result').className = "result-box";
        
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-ocr').style.display = 'block';
        document.getElementById('status').innerText = "Visez le code ou les chiffres de l'AFFICHE.";
    }

    function vibrate(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }

    window.addEventListener('DOMContentLoaded', startScanner);
</script>

</body>
</html>
