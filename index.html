<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeBonCode - AFLPH Coloz</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            /* Palette Monochrome Magenta 100% */
            --magenta: #ff00ff;
            --magenta-gradient: linear-gradient(160deg, #df22ca 0%, #ff00ff 100%);
            --magenta-light: #f9dcee;
            --bg-global: #fce8f3;
            --bg-app: #ffffff;
            --bg-gray: #fdf5f9; 
            --text-dark: #3a003a;
            
            /* Couleurs d'état adaptées */
            --success-bg: #e3f9ec;
            --success-text: #2ecc71;
            --danger-bg: #ffe6e6;
            --danger-text: #ff4d4d;
            --warning: #7a007a; 
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-global);
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-app);
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(255, 0, 255, 0.12);
            padding: 24px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--bg-gray);
        }

        .header h1 {
            font-size: 1.3rem;
            margin: 0;
            color: var(--text-dark);
            font-weight: 700;
        }

        .brand-badge {
            background: var(--magenta-gradient);
            color: white;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(255, 0, 255, 0.2);
        }

        .steps {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: var(--bg-gray);
            border-radius: 30px; 
            font-size: 0.85rem;
            font-weight: bold;
            color: #b58cb5;
            transition: all 0.3s ease;
        }

        .step.active {
            background-color: var(--magenta-light);
            color: var(--magenta);
            box-shadow: 0 2px 10px rgba(255, 0, 255, 0.1);
        }

        .step.completed {
            background-color: var(--success-bg);
            color: var(--success-text);
        }

        #camera-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: black;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            border: 2px solid var(--bg-gray);
        }

        #reader {
            width: 100%;
            border: none !important;
        }

        #status {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-dark);
            margin: 12px 0;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s, box-shadow 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-next {
            background: var(--magenta-gradient);
            color: white;
            display: none; 
            font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(255, 0, 255, 0.25);
        }

        .btn-ocr {
            background-color: var(--warning);
            color: white;
            margin-top: 5px;
        }

        .btn-reset {
            background-color: var(--bg-gray);
            color: var(--text-dark);
            margin-top: 15px;
        }
        
        .btn-reset:hover {
            background-color: #f5eaf0;
        }

        .summary-box {
            margin-top: 15px;
            background: var(--bg-gray);
            padding: 12px 15px;
            border-radius: 12px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            font-size: 0.95rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .code-badge {
            background: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-weight: bold;
            border: 1px solid #f9dcee;
            color: var(--magenta);
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            display: none;
        }

        .result.match {
            display: block;
            background-color: var(--success-bg);
            color: var(--success-text);
            border: 1px solid rgba(60, 211, 113, 0.3);
        }

        .result.mismatch {
            display: block;
            background-color: var(--danger-bg);
            color: var(--danger-text);
            border: 1px solid rgba(255, 77, 77, 0.3);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>LeBonCode</h1>
        <div class="brand-badge">AFLPH COLOZ</div>
    </div>

    <div class="steps">
        <div id="step1" class="step active">1. AFFICHE</div>
        <div id="step2" class="step">2. ÉTIQUETTE</div>
    </div>

    <div id="camera-wrapper">
        <div id="reader"></div>
    </div>

    <div id="status">Chargement...</div>

    <button id="btn-next" class="btn btn-next" onclick="passerALEtape2()">➡️ PASSER À L'ÉTIQUETTE</button>
    <button id="btn-ocr" class="btn btn-ocr" onclick="lireTexteEtChiffres()">🔢 LIRE COMME TEXTE / CHIFFRES</button>

    <div class="summary-box">
        <div class="summary-row">
            <span>Code Affiche :</span>
            <span id="val-affiche" class="code-badge">-</span>
        </div>
        <div class="summary-row">
            <span>Code Étiquette :</span>
            <span id="val-etiquette" class="code-badge">-</span>
        </div>
    </div>

    <div id="result" class="result"></div>

    <button class="btn btn-reset" onclick="resetApp()">Suivant / Réinitialiser</button>
</div>

<script>
    let codeAffiche = null;
    let codeEtiquette = null;
    let html5QrcodeScanner = null;
    let scanEnPause = false;

    function initScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, 
            qrbox: (w, h) => ({ width: Math.floor(w * 0.8), height: Math.floor(h * 0.4) }),
            rememberLastUsedCamera: true
        });
        html5QrcodeScanner.render(onScanSuccess, () => {});
        setTimeout(() => { document.getElementById('status').innerText = "Visez le code de l'AFFICHE"; }, 800);
    }

    // Détection automatique Code-barre ou QR Code (Alphanumérique)
    function onScanSuccess(text) {
        if (scanEnPause) return;
        // Supprime uniquement les caractères spéciaux, garde les lettres et chiffres
        let codeNettoye = text.trim().replace(/[^a-zA-Z0-9-]/g, "");
        if (codeNettoye) {
            enregistrerCode(codeNettoye);
        }
    }

    // Analyse OCR manuelle (Texte imprimé et Chiffres mélangés)
    async function lireTexteEtChiffres() {
        if (scanEnPause) return;
        const status = document.getElementById('status');
        status.innerText = "Analyse de l'image... Restez immobile...";
        
        const video = document.querySelector('#reader video');
        if (!video) return;

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        try {
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            // Nettoie pour enlever les espaces inutiles en gardant lettres, chiffres et tirets
            const codeDetecte = text.trim().replace(/[^a-zA-Z0-9-]/g, "");
            
            if (!codeDetecte || codeDetecte.length < 2) {
                status.innerText = "❌ Lecture difficile. Rapprochez-vous.";
                return;
            }
            enregistrerCode(codeDetecte);
        } catch (e) {
            status.innerText = "Erreur de lecture.";
        }
    }

    function enregistrerCode(code) {
        if (!codeAffiche) {
            codeAffiche = code;
            document.getElementById('val-affiche').innerText = codeAffiche;
            document.getElementById('step1').className = "step completed";
            scanEnPause = true;
            
            document.getElementById('btn-ocr').style.display = 'none';
            document.getElementById('btn-next').style.display = 'block';
            document.getElementById('status').innerText = "Affiche enregistrée. Cadrez l'étiquette et continuez.";
            vibrate(100);
        } else if (codeAffiche && !codeEtiquette) {
            codeEtiquette = code;
            document.getElementById('val-etiquette').innerText = codeEtiquette;
            document.getElementById('step2').className = "step completed";
            scanEnPause = true;
            
            document.getElementById('btn-ocr').style.display = 'none';
            vibrate(100);
            validerChoc();
        }
    }

    function passerALEtape2() {
        scanEnPause = false;
        document.getElementById('step2').className = "step active";
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-ocr').style.display = 'block';
        document.getElementById('status').innerText = "Visez le code de l'ÉTIQUETTE";
    }

    function validerChoc() {
        const res = document.getElementById('result');
        // Comparaison insensible à la casse (ex: "a3" correspondra à "A3")
        if (codeAffiche.toUpperCase() === codeEtiquette.toUpperCase()) {
            res.innerText = "✅ VALIDE : Les codes correspondent !";
            res.className = "result match";
            vibrate([100, 50, 100]);
        } else {
            res.innerText = "❌ ERREUR : Les codes sont différents !";
            res.className = "result mismatch";
            vibrate(500);
        }
        document.getElementById('status').innerText = "Contrôle terminé.";
    }

    function resetApp() {
        codeAffiche = null;
        codeEtiquette = null;
        scanEnPause = false;
        document.getElementById('val-affiche').innerText = "-";
        document.getElementById('val-etiquette').innerText = "-";
        document.getElementById('step1').className = "step active";
        document.getElementById('step2').className = "step";
        document.getElementById('result').className = "result";
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-ocr').style.display = 'block';
        document.getElementById('status').innerText = "Visez le code de l'AFFICHE";
    }

    function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

    window.addEventListener('DOMContentLoaded', initScanner);
</script>
</body>
</html>
