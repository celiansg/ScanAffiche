<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contrôle Qualité AFLPH</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    :root{
        --magenta:#ff00ff;
        --ok:#2ecc71;
        --ko:#ff4d4d;
        --bg:#fdf5f9;
    }

    body{
        font-family:sans-serif;
        background-color: var(--bg);
        margin:0;
        display:flex;
        justify-content:center;
        padding:20px;
        /* Transition fluide sur tout le body */
        transition: background-color 0.2s ease;
    }

    /* Couleurs "Flash" pour le fond du fond */
    .bg-ok-flash { background-color: #00ff7f !important; } 
    .bg-ko-flash { background-color: #ff3e3e !important; }

    .app{
        width:100%;
        max-width:520px;
        background:white;
        border-radius:20px;
        border:2px solid var(--magenta);
        padding:20px;
    }

    .kpi{
        display:flex;
        justify-content:space-around;
        font-weight:bold;
        margin-bottom:15px;
    }

    .kpi span{ font-size:18px; }

    #reader{ border-radius:12px; overflow:hidden; }

    #status{
        margin:15px 0;
        padding:12px;
        text-align:center;
        font-weight:bold;
        border-radius:10px;
        background:#f3e6f5;
    }

    .box{
        background:#fafafa;
        padding:12px;
        border-radius:10px;
        font-size:14px;
        margin-bottom:10px;
    }

    .btn{
        width:100%;
        padding:14px;
        border:none;
        border-radius:10px;
        background:#333;
        color:white;
        font-weight:bold;
        margin-top:10px;
        cursor: pointer;
    }
</style>
</head>

<body id="bodyContainer">

<div class="app">

    <div class="kpi">
        <div>✔ OK: <span id="ok">0</span></div>
        <div>✖ KO: <span id="ko">0</span></div>
    </div>

    <div id="reader"></div>

    <div id="status">Visez l’AFFICHE</div>

    <div class="box">
        <div>Affiche : <b id="affiche">-</b></div>
        <div>Étiquette : <b id="etiquette">-</b></div>
    </div>

    <button class="btn" onclick="resetCycle()">Nouveau contrôle</button>

</div>

<script>
    let state = {
        step: "AFFICHE",
        affiche: null,
        etiquette: null,
        ok: parseInt(localStorage.getItem("ok")||0),
        ko: parseInt(localStorage.getItem("ko")||0)
    };

    let lastScan = 0;
    const COOLDOWN = 1500;
    const bodyContainer = document.getElementById("bodyContainer");

    document.getElementById("ok").innerText = state.ok;
    document.getElementById("ko").innerText = state.ko;

    function onScanSuccess(text){
        if(Date.now() - lastScan < COOLDOWN) return;
        lastScan = Date.now();

        const code = text.trim().toUpperCase();

        if(state.step === "AFFICHE"){
            state.affiche = code;
            state.step = "ETIQUETTE";
            document.getElementById("affiche").innerText = code;
            document.getElementById("status").innerText = "AFFICHE OK → scanne l’étiquette";
            vibrate(80);
            return;
        }

        if(state.step === "ETIQUETTE"){
            state.etiquette = code;
            document.getElementById("etiquette").innerText = code;
            validate();
        }
    }

    function validate(){
        const ok = state.affiche === state.etiquette;

        if(ok){
            state.ok++;
            document.getElementById("status").innerHTML = "🟢 CONFORME";
            bodyContainer.classList.add("bg-ok-flash");
        } else {
            state.ko++;
            document.getElementById("status").innerHTML = "🔴 ERREUR DE CORRESPONDANCE";
            bodyContainer.classList.add("bg-ko-flash");
        }

        localStorage.setItem("ok", state.ok);
        localStorage.setItem("ko", state.ko);
        document.getElementById("ok").innerText = state.ok;
        document.getElementById("ko").innerText = state.ko;

        vibrate(ok ? 120 : [400,200,400]);

        setTimeout(() => {
            bodyContainer.classList.remove("bg-ok-flash", "bg-ko-flash");
            resetCycle();
        }, 2000);
    }

    function resetCycle(){
        state.step = "AFFICHE";
        state.affiche = null;
        state.etiquette = null;
        document.getElementById("affiche").innerText = "-";
        document.getElementById("etiquette").innerText = "-";
        document.getElementById("status").innerText = "Visez l’AFFICHE";
    }

    function vibrate(p){
        if(navigator.vibrate) navigator.vibrate(p);
    }

    new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: 250 }
    ).render(onScanSuccess);

</script>

</body>
</html>
